name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$CURRENT_TAG" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="$PREV_TAG..$CURRENT_TAG"
          fi

          echo "body<<EOF" >> "$GITHUB_OUTPUT"

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release." >> "$GITHUB_OUTPUT"
          else
            git log --pretty=format:"- %s (%h)" "$RANGE" >> "$GITHUB_OUTPUT"
          fi

          echo "" >> "$GITHUB_OUTPUT"
          echo "## Contributors" >> "$GITHUB_OUTPUT"
          if git shortlog -sn "$RANGE" | grep -q .; then
            git shortlog -sn "$RANGE" | sed -E 's/^\s*([0-9]+)\s+(.+)$/- \2 (\1 commits)/' >> "$GITHUB_OUTPUT"
          else
            echo "- No contributors found" >> "$GITHUB_OUTPUT"
          fi

          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
